<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis | Enterprise Security Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                <h1>AEGIS</h1>
            </div>
            <span class="subtitle">ENTERPRISE PASSWORD AUDITOR</span>
        </header>

        <main class="auditor-card">
            <div class="input-group">
                <label for="password-input" class="visually-hidden">Target Credential</label>
                <div class="input-wrapper" id="input-wrapper">
                    <input type="password" id="password-input" placeholder="Enter credential for analysis..." autocomplete="off">
                    <button type="button" id="toggle-visibility" class="toggle-btn" aria-label="Toggle visibility">
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="telemetry-section">
                <div class="telemetry-header">
                    <span class="telemetry-label">THREAT ASSESSMENT</span>
                    <span class="telemetry-score" id="score-display">TIER 0</span>
                </div>
                <div class="telemetry-bar">
                    <div class="segment" id="seg-1"></div>
                    <div class="segment" id="seg-2"></div>
                    <div class="segment" id="seg-3"></div>
                    <div class="segment" id="seg-4"></div>
                </div>
            </div>

            <div class="diagnostics-panel" id="diagnostics-panel">
                <div class="terminal-header">
                    <div class="dots">
                        <span></span><span></span><span></span>
                    </div>
                    <span class="terminal-title">DIAGNOSTICS_LOG</span>
                </div>
                <div class="terminal-body" id="diagnostics-content">
                    <div class="log-line text-muted">> SYSTEM READY. WAITING FOR INPUT...</div>
                </div>
            </div>

            <div class="toolkit-container">
                <button id="generate-btn" class="primary-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 8v6h6"></path></svg>
                    <span>Generate High-Entropy Alternative</span>
                </button>
            </div>
        </main>
    </div>

    <div id="toast" class="toast">
        <div class="toast-content">
            <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            <span id="toast-message">Credential copied to clipboard</span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
